  <!-- Return loop -->
  <path d="M 511 116 Q 511 155 361 155 Q 211 155 66 155 Q 66 130 66 116" stroke="#c8c0b0" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <text x="295" y="172" font-size="8" fill="#aaa" text-anchor="middle">再帰ループ（個体内）</text>

