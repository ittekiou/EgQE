      <polygon points="0 0, 8 3, 0 6" fill="#8b3a2a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="310" y="16" font-size="10" fill="#7a7a7a" text-anchor="middle" letter-spacing="2">Fig.2 / IMITATION AS ΔZ INCORPORATION</text>

