<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#f5efe0"/>
  <rect width="600" height="400" fill="#e8dcc8" filter="url(#noise)" opacity="0.15"/>

  <!-- Axes -->
  <line x1="60" y1="340" x2="560" y2="340" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="340" x2="60" y2="40" stroke="#555" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="310" y="365" fill="#888" font-family="Georgia" font-size="11" text-anchor="middle">lag residual density → B(x)</text>
  <text x="20" y="205" fill="#888" font-family="Georgia" font-size="11" text-anchor="middle" transform="rotate(-90,20,195)">phase state</text>

  <!-- B curve: rises, reaches Z₀ threshold, splits -->
  <!-- Pre-threshold: single rising curve -->
  <path d="M 80,310 C 150,300 220,260 290,190" stroke="#4a9eff" stroke-width="2" fill="none" stroke-dasharray="none"/>

  <!-- Z₀ threshold vertical line -->
  <line x1="290" y1="60" x2="290" y2="340" stroke="#ff6b35" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Post-threshold: two diverging paths -->
  <!-- Inside (upper) -->
  <path d="M 290,190 C 340,160 400,130 500,110" stroke="#a0e0a0" stroke-width="2" fill="none"/>
  <!-- Outside (lower) -->
  <path d="M 290,190 C 340,215 400,235 500,255" stroke="#e0a0e0" stroke-width="2" fill="none"/>

  <!-- Critical point dot -->
  <circle cx="290" cy="190" r="6" fill="#ff6b35"/>

  <!-- Labels -->
  <!-- Z₀ label -->
  <text x="295" y="75" fill="#ff6b35" font-family="Georgia" font-size="14" font-style="italic">Z₀</text>
  <text x="295" y="92" fill="#ff6b35" font-family="Georgia" font-size="10">critical threshold</text>

  <!-- Pre-Z₀ label -->
  <text x="175" y="293" fill="#8b7355" font-family="Georgia" font-size="12">lag accumulates</text>
  <text x="135" y="310" fill="#8b7355" font-family="Georgia" font-size="12">（未分化 / undifferentiated）</text>

  <!-- Inside label -->
  <text x="510" y="115" fill="#8b7355" font-family="Georgia" font-size="12">内 / inside</text>

  <!-- Outside label -->
  <text x="510" y="260" fill="#8b7355" font-family="Georgia" font-size="12">外 / outside</text>

  <!-- Arrow at split point -->
  <line x1="290" y1="190" x2="320" y2="168" stroke="#a0e0a0" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="290" y1="190" x2="320" y2="210" stroke="#e0a0e0" stroke-width="1" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Bottom annotation -->
  <text x="300" y="385" fill="#555" font-family="Georgia" font-size="12" text-anchor="middle">B(x) exceeds threshold → Z₀ fires → inside / outside emerge</text>

  <!-- Title -->
  <text x="300" y="28" fill="#9e8a6e" font-family="Georgia" font-size="14" text-anchor="middle" font-style="italic">SN-LIF-EX-03｜Z₀ as Phase Transition</text>
</svg>