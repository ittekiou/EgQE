<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <rect width="3000" height="3000" fill="white"/>

  <style>
    .title { font-family: Helvetica, Arial, sans-serif; font-size: 52px; font-weight: 400; fill: #000; }
    .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 400; fill: #000; }
    .label { font-family: Helvetica, Arial, sans-serif; font-size: 40px; font-weight: 400; fill: #000; }
    .small { font-family: Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 400; fill: #000; }
    .mini { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 400; fill: #000; }
    .rule { stroke: #000; stroke-width: 2; }
    .thin { stroke: #000; stroke-width: 1.5; }
  </style>

  <!-- Title -->
  <text x="1500" y="190" text-anchor="middle" class="title">From COH to NOCH</text>
  <text x="1500" y="245" text-anchor="middle" class="subtitle">Syntactic Transition of Life</text>

  <!-- Main vertical axis -->
  <text x="1500" y="520" text-anchor="middle" class="label">COH (closure)</text>
  <line x1="1500" y1="570" x2="1500" y2="705" class="rule"/>
  <polygon points="1500,742 1482,705 1518,705" fill="#000"/>

  <text x="1500" y="845" text-anchor="middle" class="label">fold (N)</text>
  <line x1="1500" y1="895" x2="1500" y2="1030" class="rule"/>
  <polygon points="1500,1067 1482,1030 1518,1030" fill="#000"/>

  <text x="1500" y="1170" text-anchor="middle" class="label">NOCH (non-closure)</text>

  <!-- Transition arrows -->
  <text x="1100" y="1385" text-anchor="end" class="small">metabolism</text>
  <line x1="1150" y1="1370" x2="1820" y2="1370" class="thin"/>
  <polygon points="1855,1370 1818,1354 1818,1386" fill="#000"/>
  <text x="1910" y="1385" text-anchor="start" class="small">information</text>

  <text x="1100" y="1465" text-anchor="end" class="small">structure</text>
  <line x1="1150" y1="1450" x2="1820" y2="1450" class="thin"/>
  <polygon points="1855,1450 1818,1434 1818,1466" fill="#000"/>
  <text x="1910" y="1465" text-anchor="start" class="small">orientation</text>

  <!-- Divider -->
  <line x1="650" y1="1615" x2="2350" y2="1615" class="rule"/>

  <!-- Middle section -->
  <text x="1050" y="1775" text-anchor="middle" class="label">N (7)</text>
  <line x1="920" y1="1805" x2="1180" y2="1805" class="thin"/>
  <text x="1050" y="1895" text-anchor="middle" class="small">fold</text>
  <text x="1050" y="1970" text-anchor="middle" class="small">orientation</text>
  <text x="1050" y="2045" text-anchor="middle" class="small">pivot</text>

  <text x="1950" y="1775" text-anchor="middle" class="label">H (1)</text>
  <line x1="1820" y1="1805" x2="2080" y2="1805" class="thin"/>
  <text x="1950" y="1895" text-anchor="middle" class="small">mediation</text>
  <text x="1950" y="1970" text-anchor="middle" class="small">lag</text>
  <text x="1950" y="2045" text-anchor="middle" class="small">passage of difference</text>
  <text x="1950" y="2120" text-anchor="middle" class="small">sustaining flow</text>

  <!-- Divider -->
  <line x1="650" y1="2275" x2="2350" y2="2275" class="rule"/>

  <!-- Bottom comparisons -->
  <text x="1000" y="2445" text-anchor="start" class="small">metabolism vs information</text>
  <text x="1840" y="2445" text-anchor="start" class="small">→ fold within one syntax</text>

  <text x="1000" y="2540" text-anchor="start" class="small">N: component</text>
  <text x="1840" y="2540" text-anchor="start" class="small">→ fold-phase</text>

  <text x="1000" y="2635" text-anchor="start" class="small">H: energy carrier</text>
  <text x="1840" y="2635" text-anchor="start" class="small">→ lag-mediation</text>

  <!-- Footnote -->
  <text x="1500" y="2840" text-anchor="middle" class="mini">Figure 1. Syntactic transition from COH to NOCH.</text>
</svg>
