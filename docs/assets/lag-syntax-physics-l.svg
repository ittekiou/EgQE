<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 860" width="600" height="860">

  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="860" fill="#f5efe0"/>
  <rect width="600" height="860" fill="#e8dcc8" filter="url(#noise)" opacity="0.15"/>

  <!-- Top rule -->
  <line x1="60" y1="80" x2="540" y2="80" stroke="#8b7355" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="55" font-family="Georgia, serif" font-size="13" fill="#9e8a6e" text-anchor="middle" letter-spacing="4">
    UNIFIED LAG SYNTAX ARCHITECTURE
  </text>

  <!-- Core equation -->
  <text x="300" y="160" font-family="Georgia, serif" font-size="32" fill="#2c1f0e" text-anchor="middle">l = S/S′</text>
  <text x="300" y="198" font-family="Georgia, serif" font-size="14" fill="#8b7355" text-anchor="middle" letter-spacing="2">
    non-coincidence · lag
  </text>

  <!-- Divider -->
  <line x1="240" y1="225" x2="360" y2="225" stroke="#c4a882" stroke-width="1"/>

  <!-- Arrow down -->
  <line x1="300" y1="235" x2="300" y2="258" stroke="#9e8a6e" stroke-width="1"/>
  <polygon points="300,265 294,252 306,252" fill="#9e8a6e"/>

  <!-- Bifurcation -->
  <line x1="300" y1="275" x2="160" y2="310" stroke="#9e8a6e" stroke-width="1"/>
  <line x1="300" y1="275" x2="440" y2="310" stroke="#9e8a6e" stroke-width="1"/>

  <!-- conf -->
  <text x="130" y="338" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">conf({lᵢ})</text>
  <text x="130" y="358" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">space</text>

  <!-- rec -->
  <text x="470" y="338" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">rec(l)</text>
  <text x="470" y="358" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">time</text>

  <!-- Lines converging -->
  <line x1="160" y1="370" x2="300" y2="400" stroke="#9e8a6e" stroke-width="1"/>
  <line x1="440" y1="370" x2="300" y2="400" stroke="#9e8a6e" stroke-width="1"/>

  <!-- velocity -->
  <text x="300" y="428" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">
    r = conf({lᵢ}) / Σrec(lᵢ)
  </text>
  <text x="300" y="446" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">
    velocity · interface
  </text>

  <line x1="300" y1="454" x2="300" y2="472" stroke="#9e8a6e" stroke-width="1"/>
  <polygon points="300,477 295,465 305,465" fill="#9e8a6e"/>

  <!-- mass -->
  <text x="300" y="496" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">
    retain(conf ∩ rec)
  </text>
  <text x="300" y="514" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">
    mass
  </text>

  <line x1="300" y1="522" x2="300" y2="538" stroke="#9e8a6e" stroke-width="1"/>
  <polygon points="300,543 295,531 305,531" fill="#9e8a6e"/>

  <!-- gravity -->
  <text x="300" y="562" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">∇m</text>
  <text x="300" y="580" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">
    gravity
  </text>

  <line x1="300" y1="588" x2="300" y2="604" stroke="#9e8a6e" stroke-width="1"/>
  <polygon points="300,609 295,597 305,597" fill="#9e8a6e"/>

  <!-- field -->
  <text x="300" y="628" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">var(m)</text>
  <text x="300" y="646" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">
    field
  </text>

  <line x1="300" y1="654" x2="300" y2="670" stroke="#9e8a6e" stroke-width="1"/>
  <polygon points="300,675 295,663 305,663" fill="#9e8a6e"/>

  <!-- electromagnetism -->
  <text x="300" y="694" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">osc(m)</text>
  <text x="300" y="712" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">
    electromagnetism
  </text>

  <line x1="300" y1="720" x2="300" y2="736" stroke="#9e8a6e" stroke-width="1"/>
  <polygon points="300,741 295,729 305,729" fill="#9e8a6e"/>

  <!-- light -->
  <text x="300" y="760" font-family="Georgia, serif" font-size="15" fill="#3a2a14" text-anchor="middle">
    prop(osc(m)) → stable propagation
  </text>
  <text x="300" y="778" font-family="Georgia, serif" font-size="11" fill="#9e8a6e" text-anchor="middle" letter-spacing="1">
    Maxwell · light · c
  </text>

  <!-- Bottom rule -->
  <line x1="60" y1="800" x2="540" y2="800" stroke="#c4a882" stroke-width="1"/>

  <!-- Final statement -->
  <text x="300" y="832" font-family="Georgia, serif" font-size="12" fill="#a08060" text-anchor="middle" letter-spacing="2">
    Physics is not law. It is syntax.
  </text>

</svg>